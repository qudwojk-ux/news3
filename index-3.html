<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#080c18">
<title>뉴스브리핑 v2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c18;--bg2:#0d1224;--bg3:#111827;--border:#1e3a5f;--text:#f0ece0;--text2:#8baacf;--acc:#e85d04;--acc2:#f48c06;--blue:#3b82f6;--green:#22c55e;--gbg:#091a0b;--gbor:#1a4020;--gtxt:#86efac}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Malgun Gothic',sans-serif;overflow-x:hidden}
header{position:sticky;top:0;z-index:100;background:linear-gradient(160deg,#060a14,#0d1224);border-bottom:1px solid var(--border);box-shadow:0 4px 28px rgba(0,0,0,.55)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;gap:10px}
.logo-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--acc);animation:pulse 2.2s ease-in-out infinite}
.logo-txt{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:900;color:var(--text);letter-spacing:-1px}
.free-badge{background:linear-gradient(135deg,#166534,#15803d);color:#86efac;font-size:9px;font-weight:800;padding:2px 6px;border-radius:10px}
.v2-badge{background:#1e3a5f;color:#60a5fa;font-size:9px;font-weight:800;padding:2px 6px;border-radius:10px}
.ts{font-size:10px;color:var(--text2);margin-top:3px;margin-left:17px}
.hdr-right{display:flex;gap:7px;flex-shrink:0;align-items:center}
.icon-btn{position:relative;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);padding:8px 11px;font-size:14px;cursor:pointer}
.badge{position:absolute;top:-5px;right:-5px;background:var(--acc);color:#fff;border-radius:10px;font-size:9px;font-weight:800;padding:1px 5px;min-width:16px;text-align:center;display:none}
.fetch-btn{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;box-shadow:0 4px 14px rgba(232,93,4,.38);display:flex;align-items:center;gap:5px}
.fetch-btn:disabled{opacity:.55}
.tab-bar{display:flex;gap:5px;overflow-x:auto;padding:9px 14px;scrollbar-width:none;background:var(--bg2);border-bottom:1px solid #0d1a28}
.tab-bar::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:4px;padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif}
.tab.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 14px rgba(59,130,246,.38)}
main{padding:13px;display:flex;flex-direction:column;gap:16px;padding-bottom:40px}
.news-grid{display:flex;flex-direction:column;gap:8px}
.news-card{display:flex;gap:10px;background:var(--bg3);border:1px solid var(--border);border-left:3px solid transparent;border-radius:10px;padding:12px}
.card-rank{font-size:18px;font-weight:900;color:#1e3a5f;font-family:Georgia,serif;min-width:24px;line-height:1.2;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-title{font-family:'Noto Serif KR',serif;font-size:14px;font-weight:700;line-height:1.55;color:var(--text);margin-bottom:6px;cursor:pointer;word-break:keep-all}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.card-meta{display:flex;align-items:center;gap:6px}
.card-source{font-size:10px;color:#4b6a8a;font-weight:700;background:var(--bg);padding:2px 7px;border-radius:4px}
.card-age{font-size:10px;color:#334d6a}
.clip-btn{display:flex;align-items:center;gap:3px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:4px 9px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif}
.clip-btn.clipped{background:#1a3060;border-color:var(--blue);color:var(--blue)}
.skel-card{background:var(--bg3);border:1px solid #1a2840;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px}
.skel{border-radius:4px;animation:shimmer 1.5s ease-in-out infinite}
.sk1{height:14px;background:#1e3a5f;width:83%}
.sk2{height:12px;background:#152840;width:55%}
.empty-box{text-align:center;padding:44px 20px;color:var(--text2)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-text{font-size:13px;line-height:1.8}
.error-box{padding:14px;background:#180e0e;border:1px solid #5a1a1a;border-radius:10px;color:#e87d7d;font-size:12px;line-height:1.6}
.daegu-section{background:linear-gradient(135deg,var(--gbg),#0c1a0e);border:1px solid var(--gbor);border-radius:14px;padding:15px}
.daegu-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.daegu-tr{display:flex;align-items:center;gap:7px}
.daegu-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green)}
.daegu-title{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:900;color:var(--gtxt)}
.daegu-refresh{background:#1a4020;border:1px solid #2d6040;border-radius:8px;color:var(--gtxt);padding:7px 10px;font-size:14px;cursor:pointer}
.daegu-grid{display:flex;flex-direction:column;gap:7px}
.daegu-card{display:flex;gap:9px;background:#0d2010;border:1px solid var(--gbor);border-left:3px solid transparent;border-radius:8px;padding:11px}
.daegu-rank{font-size:11px;font-weight:900;color:var(--green);min-width:15px;padding-top:2px;font-family:Georgia,serif}
.daegu-body{flex:1;min-width:0}
.daegu-card-title{font-family:'Noto Serif KR',serif;font-size:13px;font-weight:700;line-height:1.55;color:#dcfce7;margin-bottom:5px;cursor:pointer;word-break:keep-all}
.daegu-footer{display:flex;align-items:center;justify-content:space-between;gap:6px}
.daegu-source{font-size:10px;color:#166534;font-weight:700;background:#052e16;padding:2px 6px;border-radius:3px}
.daegu-age{font-size:10px;color:#2d5a30}
.daegu-clip{background:transparent;border:1px solid #2d6040;border-radius:5px;color:#4ade80;padding:3px 8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;right:-105%;bottom:0;width:90%;max-width:360px;background:var(--bg2);border-left:1px solid var(--border);z-index:201;transition:right .3s;overflow-y:auto}
.drawer.open{right:0}
.drawer-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2)}
.drawer-title{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:900;color:var(--text)}
.drawer-close{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:6px 10px;font-size:14px;cursor:pointer}
.drawer-body{padding:13px;display:flex;flex-direction:column;gap:9px}
.scrap-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px}
.si-title{font-family:'Noto Serif KR',serif;font-size:13px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:6px;word-break:keep-all}
.si-meta{display:flex;justify-content:space-between;margin-bottom:7px}
.si-source{font-size:10px;color:var(--text2)}
.si-date{font-size:10px;color:#4b6a8a}
.si-actions{display:flex;gap:5px}
.sa{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:7px 4px;font-size:11px;font-weight:600;cursor:pointer;text-align:center;font-family:'Noto Sans KR',sans-serif}
.sa-del{background:#180e0e;border-color:#5a1a1a;color:#e87d7d}
.clear-btn{background:#180e0e;border:1px solid #5a1a1a;border-radius:8px;color:#e87d7d;padding:11px;font-size:13px;font-weight:700;cursor:pointer;width:100%;font-family:'Noto Sans KR',sans-serif}
.drawer-empty{text-align:center;padding:60px 20px;color:var(--text2)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1a2840;border:1px solid var(--blue);border-radius:20px;padding:9px 18px;font-size:12px;color:var(--text);z-index:9999;opacity:0;transition:opacity .28s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}
.status-bar{background:#0a1a0a;border-bottom:1px solid #1a4020;padding:6px 15px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#4ade80;gap:8px}
.status-txt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ar-toggle{background:transparent;border:1px solid #2d6040;border-radius:12px;color:#4ade80;padding:3px 10px;font-size:10px;font-weight:700;cursor:pointer;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shimmer{0%,100%{opacity:.38}50%{opacity:.72}}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
.sp-g{display:inline-block;width:12px;height:12px;border:2px solid rgba(134,239,172,.25);border-top-color:#86efac;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
</style>
</head>
<body>
<div class="drawer-overlay" id="dOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-hdr"><span class="drawer-title">📌 스크랩 보관함</span><button class="drawer-close" onclick="closeDrawer()">✕</button></div>
  <div class="drawer-body" id="drawerBody"></div>
</div>
<div class="toast" id="toast"></div>

<header>
  <div class="hdr">
    <div>
      <div class="logo-row">
        <div class="logo-dot"></div>
        <span class="logo-txt">뉴스브리핑</span>
        <span class="free-badge">FREE</span>
        <span class="v2-badge">v2</span>
      </div>
      <div class="ts" id="tsEl"></div>
    </div>
    <div class="hdr-right">
      <button class="icon-btn" onclick="openDrawer()">📌<span class="badge" id="badge"></span></button>
      <button class="fetch-btn" id="fetchBtn" onclick="fetchAll()"><span>⚡</span><span>뉴스 가져오기</span></button>
    </div>
  </div>
</header>

<div class="status-bar">
  <span class="status-txt" id="statusTxt">⏱ 자동 새로고침 꺼짐</span>
  <button class="ar-toggle" id="arBtn" onclick="toggleAR()">켜기</button>
</div>

<div class="tab-bar" id="tabBar"></div>

<main>
  <div class="news-grid" id="newsGrid">
    <div class="empty-box">
      <div class="empty-icon">📰</div>
      <div class="empty-text">
        ⚡ 버튼을 눌러 최신 헤드라인을 불러오세요<br>
        <small style="color:#334d6a;font-size:11px;margin-top:6px;display:block">크레딧 소모 없음 · 완전 무료</small>
      </div>
    </div>
  </div>
  <div class="daegu-section">
    <div class="daegu-hdr">
      <div class="daegu-tr"><div class="daegu-dot"></div><span class="daegu-title">대구 · 경북 뉴스</span></div>
      <button class="daegu-refresh" id="dBtn" onclick="fetchDaegu()">🔄</button>
    </div>
    <div class="daegu-grid" id="daeguGrid">
      <div class="empty-box" style="padding:26px 10px">
        <div class="empty-icon" style="font-size:26px">🏙️</div>
        <div class="empty-text" style="color:#4ade80;opacity:.65">지역 뉴스를 불러오세요</div>
      </div>
    </div>
  </div>
</main>

<script>
const CATS=[
  {id:'pol',label:'정치',icon:'🏛️',q:'한국 정치'},
  {id:'eco',label:'경제',icon:'📈',q:'한국 경제'},
  {id:'soc',label:'사회',icon:'🏙️',q:'한국 사회'},
  {id:'ent',label:'문화·연예',icon:'🎬',q:'한국 연예'},
  {id:'spt',label:'스포츠',icon:'⚽',q:'한국 스포츠'},
  {id:'wld',label:'국제',icon:'🌐',q:'세계 국제'},
];
const DQ='대구 경북';

let activeTab='pol',newsData={},loadingCat={},daeguData=[],loadingDaegu=false;
let scraps=JSON.parse(localStorage.getItem('nbf-scraps')||'[]');
let arTimer=null,arOn=false;

buildTabs();updateBadge();

async function fetchNews(query){
  const rss=`https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=ko&gl=KR&ceid=KR:ko`;
  const errs=[];

  try{
    const u=`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`;
    const r=await fetch(u);
    if(r.ok){
      const j=await r.json();
      if(j.status==='ok'&&j.items?.length){
        return j.items.slice(0,6).map(it=>{
          const {title,src}=splitT(it.title||'');
          return{title:title.trim(),source:src,url:it.link||'',pub:it.pubDate||''};
        }).filter(i=>i.title);
      }
      errs.push('rss2json:'+(j.message||j.status));
    } else errs.push('rss2json:HTTP'+r.status);
  }catch(e){errs.push('rss2json:'+e.message);}

  try{
    const u=`https://api.allorigins.win/raw?url=${encodeURIComponent(rss)}`;
    const r=await fetch(u);
    if(r.ok){
      const x=await r.text();
      if(x.includes('<item>')) return parseXML(x);
      errs.push('allorigins:empty');
    } else errs.push('allorigins:HTTP'+r.status);
  }catch(e){errs.push('allorigins:'+e.message);}

  try{
    const u=`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(rss)}`;
    const r=await fetch(u);
    if(r.ok){
      const x=await r.text();
      if(x.includes('<item>')) return parseXML(x);
      errs.push('codetabs:empty');
    } else errs.push('codetabs:HTTP'+r.status);
  }catch(e){errs.push('codetabs:'+e.message);}

  try{
    const u=`https://corsproxy.io/?${encodeURIComponent(rss)}`;
    const r=await fetch(u);
    if(r.ok){
      const x=await r.text();
      if(x.includes('<item>')) return parseXML(x);
      errs.push('corsproxy:empty');
    } else errs.push('corsproxy:HTTP'+r.status);
  }catch(e){errs.push('corsproxy:'+e.message);}

  throw new Error('서버 응답 없음 ('+errs.slice(0,2).join(', ')+')');
}

function parseXML(xml){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  return Array.from(doc.querySelectorAll('item')).slice(0,6).map(it=>{
    const raw=it.querySelector('title')?.textContent||'';
    const {title,src}=splitT(raw);
    const srcEl=it.querySelector('source');
    const source=srcEl?.textContent?.trim()||src;
    let url=it.querySelector('link')?.textContent?.trim()||'';
    const pub=it.querySelector('pubDate')?.textContent||'';
    return{title:title.trim(),source,url,pub};
  }).filter(i=>i.title);
}

function splitT(t){const i=t.lastIndexOf(' - ');if(i>0)return{title:t.slice(0,i),src:t.slice(i+3)};return{title:t,src:''};}
function relTime(p){if(!p)return'';const m=Math.floor((Date.now()-new Date(p))/60000);if(m<1)return'방금';if(m<60)return m+'분 전';const h=Math.floor(m/60);if(h<24)return h+'시간 전';return Math.floor(h/24)+'일 전';}

async function fetchAll(){
  const btn=document.getElementById('fetchBtn');
  btn.disabled=true;btn.innerHTML='<span class="sp"></span> 불러오는 중...';
  setStatus('⏳ 뉴스 수집 중...');stamp();
  await Promise.allSettled([...CATS.map(c=>fetchCat(c.id)),fetchDaegu()]);
  btn.disabled=false;btn.innerHTML='<span>⚡</span><span>뉴스 가져오기</span>';
  const hasData=Object.values(newsData).some(d=>Array.isArray(d)&&d.length);
  if(hasData){setStatus('✅ 완료');toast('✅ 업데이트 완료!');}
  else{setStatus('⚠️ 모든 서버 응답 없음');toast('⚠️ 네트워크 확인');}
}

async function fetchCat(id){
  const cat=CATS.find(c=>c.id===id);if(!cat||loadingCat[id])return;
  loadingCat[id]=true;if(id===activeTab)renderNews();
  try{newsData[id]=await fetchNews(cat.q);}catch(e){newsData[id]={err:e.message};}
  loadingCat[id]=false;if(id===activeTab)renderNews();
}

async function fetchDaegu(){
  if(loadingDaegu)return;loadingDaegu=true;
  const btn=document.getElementById('dBtn');btn.disabled=true;btn.innerHTML='<span class="sp-g"></span>';
  renderDaegu(null);
  try{daeguData=await fetchNews(DQ);renderDaegu(daeguData);}
  catch(e){daeguData=[];renderDaegu([]);}
  loadingDaegu=false;btn.disabled=false;btn.innerHTML='🔄';
}

function buildTabs(){document.getElementById('tabBar').innerHTML=CATS.map(c=>`<button class="tab ${c.id===activeTab?'active':''}" onclick="switchTab('${c.id}')"><span>${c.icon}</span>${c.label}</button>`).join('');}
function switchTab(id){activeTab=id;buildTabs();renderNews();if(!newsData[id]&&!loadingCat[id])fetchCat(id);}

function renderNews(){
  const el=document.getElementById('newsGrid');
  const cat=CATS.find(c=>c.id===activeTab);
  if(loadingCat[activeTab]){el.innerHTML=skels(5,'nat');return;}
  const d=newsData[activeTab];
  if(!d){el.innerHTML=`<div class="empty-box"><div class="empty-icon">${cat?.icon||'📰'}</div><div class="empty-text">⚡ 버튼을 눌러 불러오세요</div></div>`;return;}
  if(d.err){el.innerHTML=`<div class="error-box">⚠️ <strong>${esc(d.err)}</strong><br><br><small>잠시 후 다시 시도해주세요.</small></div>`;return;}
  el.innerHTML=d.map((item,i)=>{
    const sc=isSc(item);
    return `<div class="news-card">
      <div class="card-rank">${pad(i+1)}</div>
      <div class="card-body">
        <div class="card-title" onclick="goUrl('nat',${i})">${esc(item.title)}</div>
        <div class="card-footer">
          <div class="card-meta">${item.source?`<span class="card-source">${esc(item.source)}</span>`:''}<span class="card-age">${relTime(item.pub)}</span></div>
          <button class="clip-btn ${sc?'clipped':''}" onclick="doScrap('nat',${i})">${sc?'📌 저장됨':'📌 스크랩'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderDaegu(items){
  const el=document.getElementById('daeguGrid');
  if(items===null){el.innerHTML=skels(4,'dg');return;}
  if(!items.length){el.innerHTML=`<div class="empty-box" style="padding:26px"><div class="empty-icon" style="font-size:26px">🏙️</div><div class="empty-text" style="color:#4ade80;opacity:.7">불러오지 못했습니다</div></div>`;return;}
  el.innerHTML=items.map((item,i)=>`<div class="daegu-card">
    <div class="daegu-rank">${i+1}</div>
    <div class="daegu-body">
      <div class="daegu-card-title" onclick="goUrl('dg',${i})">${esc(item.title)}</div>
      <div class="daegu-footer">
        <div style="display:flex;align-items:center;gap:5px">${item.source?`<span class="daegu-source">${esc(item.source)}</span>`:''}<span class="daegu-age">${relTime(item.pub)}</span></div>
        <button class="daegu-clip" onclick="doScrap('dg',${i})">📌</button>
      </div>
    </div>
  </div>`).join('');
}

function skels(n,t){const dg=t==='dg';return Array(n).fill(0).map(()=>`<div class="skel-card" ${dg?'style="background:#0d2010;border-color:#1a4020"':''}><div class="skel sk1" ${dg?'style="background:#1a4020"':''}></div><div class="skel sk2" ${dg?'style="background:#0f2e15"':''}></div></div>`).join('');}
function getItem(src,idx){return src==='dg'?daeguData[idx]:(newsData[activeTab]||[])[idx];}
function isSc(item){return scraps.some(s=>s.title===item.title);}

function doScrap(src,idx){
  const item=getItem(src,idx);if(!item)return;
  if(!isSc(item)){
    scraps.unshift({...item,savedAt:new Date().toISOString()});
    if(scraps.length>100)scraps=scraps.slice(0,100);
    save();updateBadge();renderNews();renderDaegu(daeguData);
  }
  shareItem(item);toast('📌 스크랩 저장!');
}

function shareItem(item){
  const text=`📰 ${item.title}\n\n출처: ${item.source||''}\n${item.url||''}`.trim();
  if(navigator.share){navigator.share({title:item.title,text,url:item.url||location.href}).catch(()=>{});}
  else{navigator.clipboard?.writeText(text).then(()=>toast('📋 복사되었습니다'));}
}

function shareIdx(i){shareItem(scraps[i]);}
function delScrap(i){scraps.splice(i,1);save();updateBadge();renderDrawer();renderNews();}
function clearAll(){if(!confirm('전체 삭제?'))return;scraps=[];save();updateBadge();renderDrawer();renderNews();}
function save(){localStorage.setItem('nbf-scraps',JSON.stringify(scraps));}
function updateBadge(){const b=document.getElementById('badge');b.textContent=scraps.length||'';b.style.display=scraps.length?'':'none';}
function openDrawer(){renderDrawer();document.getElementById('dOverlay').classList.add('open');document.getElementById('drawer').classList.add('open');}
function closeDrawer(){document.getElementById('dOverlay').classList.remove('open');document.getElementById('drawer').classList.remove('open');}

function renderDrawer(){
  const body=document.getElementById('drawerBody');
  if(!scraps.length){body.innerHTML=`<div class="drawer-empty"><div style="font-size:34px;margin-bottom:12px">📌</div><div>스크랩한 기사가 없습니다</div></div>`;return;}
  body.innerHTML=`<div style="font-size:11px;color:var(--text2);margin-bottom:4px">${scraps.length}개 저장됨</div>${scraps.map((item,i)=>`<div class="scrap-item">
    <div class="si-title">${esc(item.title)}</div>
    <div class="si-meta"><span class="si-source">${esc(item.source||'')}</span><span class="si-date">${fmtDate(item.savedAt)}</span></div>
    <div class="si-actions">
      <button class="sa" onclick="shareIdx(${i})">공유·복사</button>
      ${item.url?`<button class="sa" onclick="goUrl2('${esc(item.url)}')">원문</button>`:''}
      <button class="sa sa-del" onclick="delScrap(${i})">삭제</button>
    </div>
  </div>`).join('')}<button class="clear-btn" onclick="clearAll()">🗑️ 전체 삭제</button>`;
}

function toggleAR(){
  arOn=!arOn;const b=document.getElementById('arBtn');
  if(arOn){arTimer=setInterval(fetchAll,30*60*1000);setStatus('⏱ 30분마다 자동 새로고침 켜짐');b.textContent='끄기';toast('✅ 자동 업데이트 켜짐');}
  else{clearInterval(arTimer);setStatus('⏱ 자동 새로고침 꺼짐');b.textContent='켜기';}
}

function setStatus(t){document.getElementById('statusTxt').textContent=t;}
function goUrl(src,idx){const item=getItem(src,idx);if(item?.url&&item.url.startsWith('http'))window.open(item.url,'_blank');}
function goUrl2(url){if(url&&url.startsWith('http'))window.open(url,'_blank');}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):''}
function pad(n){return String(n).padStart(2,'0');}
function stamp(){document.getElementById('tsEl').textContent='📅 '+new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})+' 기준';}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
let tt;function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2600);}
</script>
</body>
