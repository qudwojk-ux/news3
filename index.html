<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080c18">
<title>뉴스브리핑 v5</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c18;--bg2:#0d1224;--bg3:#111827;--border:#1e3a5f;--text:#f0ece0;--text2:#8baacf;--acc:#e85d04;--acc2:#f48c06;--blue:#3b82f6;--purple:#7c3aed;--green:#22c55e;--gbg:#091a0b;--gbor:#1a4020;--gtxt:#86efac}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow-x:hidden}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:linear-gradient(160deg,#060a14,#0d1224);border-bottom:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.5)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;gap:8px}
.logo-row{display:flex;align-items:center;gap:6px}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--acc);animation:pulse 2s ease-in-out infinite}
.logo-txt{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:900;color:var(--text);letter-spacing:-1px}
.b{font-size:9px;font-weight:800;padding:2px 6px;border-radius:10px}
.b-free{background:linear-gradient(135deg,#166534,#15803d);color:#86efac}
.b-v5{background:#3b0764;color:#c084fc}
.ts{font-size:10px;color:var(--text2);margin-top:2px;margin-left:14px}
.hdr-right{display:flex;gap:6px;flex-shrink:0;align-items:center}
.icon-btn{position:relative;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);padding:8px 10px;font-size:13px;cursor:pointer}
.notif{position:absolute;top:-5px;right:-5px;background:var(--acc);color:#fff;border-radius:10px;font-size:9px;font-weight:800;padding:1px 5px;min-width:16px;text-align:center;display:none}
.fetch-btn{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;border-radius:8px;padding:9px 13px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;gap:5px;box-shadow:0 4px 12px rgba(232,93,4,.35)}
.fetch-btn:disabled{opacity:.5}

/* FILTER PANELS */
.filter-wrap{background:var(--bg2);border-bottom:2px solid var(--border)}
.panel{border-bottom:1px solid #0d1a28}
.panel:last-child{border-bottom:none}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;user-select:none}
.panel-title{font-size:12px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:5px}
.panel-right{display:flex;gap:5px;align-items:center}
.panel-action{background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--text2);padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.panel-arrow{font-size:10px;color:var(--text2);transition:transform .2s;margin-left:4px}
.panel-arrow.open{transform:rotate(180deg)}
.panel-body{display:none;padding:4px 14px 12px}
.panel-body.open{display:block}
.filter-cat-lbl{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:1px;margin:8px 0 5px;text-transform:uppercase}
.filter-btns{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px}
.filter-btn{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;display:flex;align-items:center;gap:4px}
.filter-btn.on.src{background:var(--blue);border-color:var(--blue);color:#fff}
.filter-btn.on.topic{background:var(--purple);border-color:var(--purple);color:#fff}

/* ACTIVE FILTER SUMMARY */
.filter-summary{background:#0a0e1a;border-bottom:1px solid var(--border);padding:6px 14px;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none}
.filter-summary::-webkit-scrollbar{display:none}
.filter-chip{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.chip-src{background:#1e3a5f;color:#60a5fa}
.chip-topic{background:#3b0764;color:#c084fc}
.chip-all{background:#1a2840;color:var(--text2)}

/* SORT + COUNT BAR */
.ctrl-bar{background:#090d1a;border-bottom:1px solid var(--border);padding:7px 14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.ctrl-lbl{font-size:10px;color:var(--text2);flex-shrink:0}
.sort-btns,.cnt-btns{display:flex;gap:4px}
.sort-btn,.cnt-btn{background:transparent;border:1px solid var(--border);border-radius:14px;color:var(--text2);padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap}
.sort-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}
.cnt-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.ctrl-spacer{flex:1}
.status-txt{font-size:10px;color:#4ade80;white-space:nowrap}

/* MAIN */
main{padding:12px;display:flex;flex-direction:column;gap:14px;padding-bottom:40px}
.result-info{font-size:11px;color:var(--text2);padding:2px 0;display:flex;align-items:center;gap:6px}
.result-cnt{color:var(--blue);font-weight:700}
.news-grid{display:flex;flex-direction:column;gap:7px}

/* NEWS CARD */
.news-card{background:var(--bg3);border:1px solid var(--border);border-left:3px solid transparent;border-radius:10px;overflow:hidden;transition:border-left-color .2s}
.news-card.expanded{border-left-color:var(--blue)}
.card-main{display:flex;gap:9px;padding:11px 12px;cursor:pointer;align-items:flex-start}
.card-src-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.card-body{flex:1;min-width:0}
.card-title{font-family:'Noto Serif KR',serif;font-size:14px;font-weight:700;line-height:1.55;color:var(--text);margin-bottom:4px;word-break:keep-all}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.card-source{font-size:10px;color:#4b6a8a;font-weight:700;background:var(--bg);padding:2px 7px;border-radius:4px}
.card-age{font-size:10px;color:#334d6a}
.card-topic-chip{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;background:#3b0764;color:#c084fc}
.expand-arrow{font-size:11px;color:var(--text2);flex-shrink:0;margin-top:3px;transition:transform .2s}
.news-card.expanded .expand-arrow{transform:rotate(180deg)}
.card-expand{display:none;padding:0 12px 11px;border-top:1px solid #1a2840}
.news-card.expanded .card-expand{display:block}
.card-desc{font-size:12px;color:var(--text2);line-height:1.7;padding-top:9px;margin-bottom:10px;word-break:keep-all}
.card-actions{display:flex;gap:6px;flex-wrap:wrap}
.orig-btn{display:flex;align-items:center;gap:3px;background:#1a3060;border:1px solid var(--blue);border-radius:7px;color:#93c5fd;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;font-family:'Noto Sans KR',sans-serif;white-space:nowrap}
.clip-btn{display:flex;align-items:center;gap:3px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--text2);padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif}
.clip-btn.clipped{background:#1a3060;border-color:var(--blue);color:var(--blue)}
.src-group-hdr{display:flex;align-items:center;gap:8px;padding:5px 2px 3px;margin-top:5px}
.src-group-dot{width:7px;height:7px;border-radius:50%}
.src-group-name{font-size:11px;font-weight:700;color:var(--text2)}
.src-group-cnt{font-size:10px;color:#334d6a}

/* SKELETON */
.skel-card{background:var(--bg3);border:1px solid #1a2840;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px}
.sk{border-radius:4px;animation:shimmer 1.5s ease-in-out infinite}
.sk1{height:14px;background:#1e3a5f;width:82%}
.sk2{height:11px;background:#152840;width:52%}

/* EMPTY/ERROR */
.empty-box{text-align:center;padding:38px 20px;color:var(--text2)}
.empty-icon{font-size:32px;margin-bottom:10px}
.empty-text{font-size:13px;line-height:1.8}

/* DAEGU */
.daegu-section{background:linear-gradient(135deg,var(--gbg),#0c1a0e);border:1px solid var(--gbor);border-radius:14px;padding:14px}
.daegu-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.daegu-tr{display:flex;align-items:center;gap:7px}
.daegu-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green)}
.daegu-title-txt{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:900;color:var(--gtxt)}
.daegu-refresh{background:#1a4020;border:1px solid #2d6040;border-radius:8px;color:var(--gtxt);padding:6px 10px;font-size:13px;cursor:pointer}
.daegu-grid{display:flex;flex-direction:column;gap:6px}
.daegu-card{background:#0d2010;border:1px solid var(--gbor);border-left:3px solid transparent;border-radius:8px;overflow:hidden}
.daegu-card.expanded{border-left-color:var(--green)}
.daegu-main{display:flex;gap:8px;padding:10px 11px;cursor:pointer;align-items:flex-start}
.daegu-rank{font-size:12px;font-weight:900;color:var(--green);flex-shrink:0;padding-top:2px;min-width:18px;font-family:Georgia,serif}
.daegu-body{flex:1;min-width:0}
.daegu-card-title{font-family:'Noto Serif KR',serif;font-size:13px;font-weight:700;line-height:1.55;color:#dcfce7;margin-bottom:3px;word-break:keep-all}
.daegu-meta{display:flex;align-items:center;gap:5px}
.daegu-source{font-size:10px;color:#166534;font-weight:700;background:#052e16;padding:2px 6px;border-radius:3px}
.daegu-age{font-size:10px;color:#2d5a30}
.daegu-arrow{font-size:10px;color:#4ade80;flex-shrink:0;margin-top:3px;transition:transform .2s}
.daegu-card.expanded .daegu-arrow{transform:rotate(180deg)}
.daegu-expand{display:none;padding:0 11px 10px;border-top:1px solid #1a3520}
.daegu-card.expanded .daegu-expand{display:block}
.daegu-desc{font-size:12px;color:#4ade80;line-height:1.65;padding-top:8px;margin-bottom:8px;opacity:.9;word-break:keep-all}
.daegu-actions{display:flex;gap:5px}
.daegu-orig{display:flex;align-items:center;gap:3px;background:#1a4020;border:1px solid #2d6040;border-radius:7px;color:#86efac;padding:6px 11px;font-size:11px;font-weight:700;text-decoration:none;font-family:'Noto Sans KR',sans-serif}
.daegu-clip{background:transparent;border:1px solid #2d6040;border-radius:7px;color:#4ade80;padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;right:-105%;bottom:0;width:90%;max-width:360px;background:var(--bg2);border-left:1px solid var(--border);z-index:201;transition:right .3s;overflow-y:auto}
.drawer.open{right:0}
.drawer-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2)}
.drawer-title{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:900;color:var(--text)}
.drawer-close{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:5px 9px;font-size:13px;cursor:pointer}
.drawer-body{padding:12px;display:flex;flex-direction:column;gap:8px}
.scrap-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px}
.si-title{font-family:'Noto Serif KR',serif;font-size:12px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:5px;word-break:keep-all}
.si-meta{display:flex;justify-content:space-between;margin-bottom:6px}
.si-src{font-size:10px;color:var(--text2)}
.si-dt{font-size:10px;color:#4b6a8a}
.si-acts{display:flex;gap:4px}
.sa{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:6px 4px;font-size:10px;font-weight:600;cursor:pointer;text-align:center;font-family:'Noto Sans KR',sans-serif}
.sa-del{background:#180e0e;border-color:#5a1a1a;color:#e87d7d}
.clear-btn{background:#180e0e;border:1px solid #5a1a1a;border-radius:8px;color:#e87d7d;padding:10px;font-size:12px;font-weight:700;cursor:pointer;width:100%;font-family:'Noto Sans KR',sans-serif}
.drawer-empty{text-align:center;padding:60px 20px;color:var(--text2)}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a2840;border:1px solid var(--blue);border-radius:20px;padding:8px 16px;font-size:12px;color:var(--text);z-index:9999;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shimmer{0%,100%{opacity:.35}50%{opacity:.7}}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
.sp-g{display:inline-block;width:12px;height:12px;border:2px solid rgba(134,239,172,.2);border-top-color:#86efac;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
</style>
</head>
<body>

<div class="drawer-overlay" id="dOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-hdr"><span class="drawer-title">📌 스크랩 보관함</span><button class="drawer-close" onclick="closeDrawer()">✕</button></div>
  <div class="drawer-body" id="drawerBody"></div>
</div>
<div class="toast" id="toast"></div>

<!-- HEADER -->
<header>
  <div class="hdr">
    <div>
      <div class="logo-row">
        <div class="logo-dot"></div>
        <span class="logo-txt">뉴스브리핑</span>
        <span class="b b-free">FREE</span>
        <span class="b b-v5">v5</span>
      </div>
      <div class="ts" id="tsEl"></div>
    </div>
    <div class="hdr-right">
      <button class="icon-btn" onclick="openDrawer()">📌<span class="notif" id="badge"></span></button>
      <button class="fetch-btn" id="fetchBtn" onclick="fetchAll()"><span>⚡</span><span>뉴스 가져오기</span></button>
    </div>
  </div>
</header>

<!-- FILTER PANELS -->
<div class="filter-wrap">
  <!-- 언론사 -->
  <div class="panel">
    <div class="panel-hdr" onclick="togglePanel('src')">
      <span class="panel-title">📰 언론사 <span id="srcCount" style="color:var(--blue);font-size:10px"></span></span>
      <div class="panel-right">
        <button class="panel-action" onclick="event.stopPropagation();srcAll()">전체</button>
        <button class="panel-action" onclick="event.stopPropagation();srcNone()">해제</button>
        <span class="panel-arrow" id="srcArrow">▼</span>
      </div>
    </div>
    <div class="panel-body" id="srcBody"></div>
  </div>
  <!-- 분야 -->
  <div class="panel">
    <div class="panel-hdr" onclick="togglePanel('topic')">
      <span class="panel-title">🗂️ 분야 <span id="topicCount" style="color:var(--purple);font-size:10px"></span></span>
      <div class="panel-right">
        <button class="panel-action" onclick="event.stopPropagation();topicAll()">전체</button>
        <button class="panel-action" onclick="event.stopPropagation();topicNone()">해제</button>
        <span class="panel-arrow" id="topicArrow">▼</span>
      </div>
    </div>
    <div class="panel-body" id="topicBody"></div>
  </div>
</div>

<!-- ACTIVE FILTER CHIPS -->
<div class="filter-summary" id="filterSummary"></div>

<!-- SORT + COUNT BAR -->
<div class="ctrl-bar">
  <span class="ctrl-lbl">정렬:</span>
  <div class="sort-btns">
    <button class="sort-btn active" onclick="setSort('latest',this)">🕐 최신순</button>
    <button class="sort-btn" onclick="setSort('source',this)">📰 언론사별</button>
    <button class="sort-btn" onclick="setSort('oldest',this)">🕰 오래된순</button>
  </div>
  <span class="ctrl-lbl">개수:</span>
  <div class="cnt-btns">
    <button class="cnt-btn" onclick="setCount(10,this)">10</button>
    <button class="cnt-btn active" onclick="setCount(20,this)">20</button>
    <button class="cnt-btn" onclick="setCount(30,this)">30</button>
  </div>
  <div class="ctrl-spacer"></div>
  <span class="status-txt" id="statusTxt"></span>
</div>

<!-- MAIN -->
<main>
  <div id="resultInfo" class="result-info" style="display:none"></div>
  <div class="news-grid" id="newsGrid">
    <div class="empty-box">
      <div class="empty-icon">📰</div>
      <div class="empty-text">언론사·분야를 선택하고<br>⚡ 버튼을 눌러 뉴스를 불러오세요<br><small style="color:#334d6a;font-size:11px;margin-top:6px;display:block">크레딧 소모 없음 · 완전 무료</small></div>
    </div>
  </div>

  <!-- 대구·경북 고정 섹션 -->
  <div class="daegu-section">
    <div class="daegu-hdr">
      <div class="daegu-tr"><div class="daegu-dot"></div><span class="daegu-title-txt">대구 · 경북 뉴스</span></div>
      <button class="daegu-refresh" id="dBtn" onclick="fetchDaegu()">🔄</button>
    </div>
    <div class="daegu-grid" id="daeguGrid">
      <div class="empty-box" style="padding:20px 10px">
        <div class="empty-icon" style="font-size:22px">🏙️</div>
        <div class="empty-text" style="color:#4ade80;opacity:.6;font-size:12px">⚡ 버튼을 누르면 자동으로 불러옵니다</div>
      </div>
    </div>
  </div>
</main>

<script>
// ══════════════════════════════════════════
//  언론사 정의
// ══════════════════════════════════════════
const SOURCES = [
  {id:'yna',      name:'연합뉴스', cat:'통신·방송', color:'#2563eb', on:true,  rss:'https://www.yna.co.kr/rss/news.xml'},
  {id:'kbs',      name:'KBS',      cat:'통신·방송', color:'#dc2626', on:true,  rss:'https://news.kbs.co.kr/rss/rss.xml'},
  {id:'mbc',      name:'MBC',      cat:'통신·방송', color:'#16a34a', on:true,  rss:'https://imnews.imbc.com/rss/news/news_00.xml'},
  {id:'sbs',      name:'SBS',      cat:'통신·방송', color:'#7c3aed', on:true,  rss:'https://news.sbs.co.kr/news/SRSSFeeds.do?plink=RSSREADER'},
  {id:'ytn',      name:'YTN',      cat:'통신·방송', color:'#b45309', on:true,  rss:'https://www.ytn.co.kr/rss/rss_news.php'},
  {id:'chosun',   name:'조선일보', cat:'종합일간지', color:'#1e40af', on:true,  rss:'https://www.chosun.com/arc/outboundfeeds/rss/?outputType=xml'},
  {id:'joongang', name:'중앙일보', cat:'종합일간지', color:'#0f766e', on:true,  rss:'https://rss.joins.com/joins_news_list.xml'},
  {id:'donga',    name:'동아일보', cat:'종합일간지', color:'#9f1239', on:true,  rss:'https://rss.donga.com/total.xml'},
  {id:'hani',     name:'한겨레',   cat:'종합일간지', color:'#166534', on:true,  rss:'https://www.hani.co.kr/rss/'},
  {id:'khan',     name:'경향신문', cat:'종합일간지', color:'#1e3a8a', on:true,  rss:'https://www.khan.co.kr/rss/rssdata/total_news.xml'},
  {id:'hankyung', name:'한국경제', cat:'경제지',     color:'#c2410c', on:true,  rss:'https://www.hankyung.com/feed/all-news'},
  {id:'mk',       name:'매일경제', cat:'경제지',     color:'#1d4ed8', on:true,  rss:'https://www.mk.co.kr/rss/30000001/'},

function matchTopic(item){
  const onTopics=TOPICS.filter(t=>t.on);
  if(!onTopics.length) return {match:true, topicName:''};
  const text=(item.title+' '+(item.desc||'')).toLowerCase();
  for(const t of onTopics){
    if(t.kw.some(k=>text.includes(k.toLowerCase()))){
      return {match:true, topicName:t.name, topicIcon:t.icon};
    }
  }
  return {match:false};
}

function getFiltered(){
  const sorted=getSorted();
  return sorted.map((item,i)=>({...item, _idx:i, _topic:matchTopic(item)}))
               .filter(item=>item._topic.match);
}

function setCount(n,btn){

  btn.classList.add('active');

}
function getSorted(){
  const items=[...allItems];
  if(sortMode==='latest') return items.sort((a,b)=>new Date(b.pub)-new Date(a.pub));
  if(sortMode==='oldest') return items.sort((a,b)=>new Date(a.pub)-new Date(b.pub));
  if(sortMode==='source') return items.sort((a,b)=>a.source.localeCompare(b.source,'ko')||new Date(b.pub)-new Date(a.pub));
  return items;
}

// ══════════════════════════════════════════
//  RSS FETCH (4중 백업)
// ══════════════════════════════════════════
async function fetchRSS(src){
  const rss=src.rss;
  try{
    const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`);
    if(r.ok){const j=await r.json();if(j.status==='ok'&&j.items?.length)return j.items.slice(0,40).map(it=>mkItem(it.title,it.link,it.pubDate,it.description,src));}
  }catch{}
  try{
    const r=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(rss)}`);
    if(r.ok){const x=await r.text();if(x.includes('<item>'))return parseXML(x,src);}
  }catch{}
  try{
    const r=await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(rss)}`);
    if(r.ok){const x=await r.text();if(x.includes('<item>'))return parseXML(x,src);}
  }catch{}
  try{
    const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(rss)}`);
    if(r.ok){const x=await r.text();if(x.includes('<item>'))return parseXML(x,src);}
  }catch{}
  return [];
}

function parseXML(xml,src){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  return Array.from(doc.querySelectorAll('item')).slice(0,40).map(it=>{
    const title=it.querySelector('title')?.textContent||'';
    const url=it.querySelector('link')?.textContent?.trim()||'';
    const pub=it.querySelector('pubDate')?.textContent||'';
    const desc=it.querySelector('description')?.textContent||'';
    return mkItem(title,url,pub,desc,src);
  }).filter(i=>i.title);
}

function mkItem(title,url,pub,desc,src){
  const t=(title||'').replace(/ - [^-]+$/,'').trim();
  return{title:t,url:url||'',pub:pub||'',desc:strip(desc||'').slice(0,200),source:src.name,srcId:src.id,color:src.color};
}
function strip(h){const d=document.createElement('div');d.innerHTML=h;return(d.textContent||d.innerText||'').replace(/\s+/g,' ').trim();}

async function fetchAll(){
  const selected=SOURCES.filter(s=>s.on&&!s.daegu);
  if(!selected.length){toast('⚠️ 언론사를 하나 이상 선택해주세요');return;}
  loadingMain=true; allItems=[]; expandedMain.clear();
  stamp(); setStatus('⏳ 수집 중...');
  const btn=document.getElementById('fetchBtn');
  btn.disabled=true; btn.innerHTML='<span class="sp"></span> 불러오는 중...';
  renderMain();
  // 완료되는 대로 즉시 화면 업데이트
  await Promise.allSettled(selected.map(async src=>{
    const items=await fetchRSS(src);
    allItems.push(...items);
    renderMain();
  }));
  await fetchDaegu();
  loadingMain=false;
  btn.disabled=false; btn.innerHTML='<span>⚡</span><span>뉴스 가져오기</span>';
  if(allItems.length){setStatus(`✅ ${allItems.length}개 수집`);toast(`✅ ${allItems.length}개 기사 완료!`);}
  else{setStatus('⚠️ 응답 없음');toast('⚠️ 네트워크를 확인해주세요');}
  renderMain();
}

async function fetchDaegu(){
  const dBtn=document.getElementById('dBtn');
  dBtn.disabled=true; dBtn.innerHTML='<span class="sp-g"></span>';
  renderDaegu(null);
  daeguItems=[];
  await Promise.allSettled(SOURCES.filter(s=>s.daegu&&s.on).map(async src=>{
    const items=await fetchRSS(src);
    daeguItems.push(...items);
  }));
  daeguItems.sort((a,b)=>new Date(b.pub)-new Date(a.pub));
  dBtn.disabled=false; dBtn.innerHTML='🔄';
  renderDaegu(daeguItems);
}

    return;

  const filtered=getFiltered().slice(0,newsCount);

  ri.innerHTML=`<span class="result-cnt">${filtered.length}건</span>표시 중 (전체 ${allItems.length}건 수집${onTopics.length?` · "${onTopics.map(t=>t.name).join('·')}" 필터 적용`:''})`;

    el.innerHTML=`<div class="empty-box"><div class="empty-icon">🔍</div><div class="empty-text">선택한 분야의 기사가 없습니다<br><small style="color:#334d6a">다른 분야를 선택하거나 분야를 해제해보세요</small></div></div>`;
    return;
  }

  if(sortMode==='source'){
    const groups={};
    filtered.forEach((item,i)=>{
      if(!groups[item.source])groups[item.source]={color:item.color,items:[]};
      groups[item.source].items.push({item,i});
    });
    el.innerHTML=Object.entries(groups).map(([srcName,grp])=>`
      <div class="src-group-hdr">
        <div class="src-group-dot" style="background:${grp.color}"></div>
        <span class="src-group-name">${srcName}</span>
        <span class="src-group-cnt">${grp.items.length}건</span>

  } else {
    el.innerHTML=filtered.map((item,i)=>cardHTML(item,i)).join('');
  }
}

      <div class="card-src-dot" style="background:${item.color||'#4b6a8a'}"></div>
      <div class="card-body">
        <div class="card-title">${esc(item.title)}</div>
        <div class="card-meta">
          <span class="card-source">${esc(item.source)}</span>

      </div>
      <span class="expand-arrow">▼</span>
    </div>
    <div class="card-expand">
      <div class="card-desc">${esc(item.desc||'요약 없음')}</div>
      <div class="card-actions">
        ${hasUrl?`<a class="orig-btn" href="${esc(item.url)}" target="_blank" rel="noopener">🔗 원본기사</a>`:''}

function skels(n){return Array(n).fill(0).map(()=>`<div class="skel-card"><div class="sk sk1"></div><div class="sk sk2"></div></div>`).join('');}
function skelsDg(n){return Array(n).fill(0).map(()=>`<div class="skel-card" style="background:#0d2010;border-color:#1a4020"><div class="sk sk1" style="background:#1a4020"></div><div class="sk sk2" style="background:#0f2e15"></div></div>`).join('');}

// ══ SCRAP ══
function isSc(item){return scraps.some(s=>s.title===item.title);}
function getMainItem(i){return getFiltered()[i];}
function doScrap(i,src){
  const item=src==='dg'?daeguItems[i]:getMainItem(i);
  if(!item)return;
  if(!isSc(item)){
    scraps.unshift({...item,savedAt:new Date().toISOString()});
    if(scraps.length>100)scraps=scraps.slice(0,100);
    saveScraps();updateBadge();
    if(src==='dg')renderDaegu(daeguItems);else renderMain();
  }
  shareItem(item);toast('📌 스크랩 저장!');
}
function shareItem(item){
  const text=`📰 ${item.title}\n\n${item.desc||''}\n\n출처: ${item.source||''}\n${item.url||''}`.trim();
  if(navigator.share){navigator.share({title:item.title,text,url:item.url||location.href}).catch(()=>{});}
  else{navigator.clipboard?.writeText(text).then(()=>toast('📋 복사되었습니다'));}
}
function shareScrapIdx(i){shareItem(scraps[i]);}
function delScrap(i){scraps.splice(i,1);saveScraps();updateBadge();renderDrawer();renderMain();}
function clearAll(){if(!confirm('전체 삭제?'))return;scraps=[];saveScraps();updateBadge();renderDrawer();renderMain();}
function saveScraps(){localStorage.setItem('nbf5-scraps',JSON.stringify(scraps));}
function updateBadge(){const b=document.getElementById('badge');b.textContent=scraps.length||'';b.style.display=scraps.length?'':'none';}

// ══ DRAWER ══
function openDrawer(){renderDrawer();document.getElementById('dOverlay').classList.add('open');document.getElementById('drawer').classList.add('open');}
function closeDrawer(){document.getElementById('dOverlay').classList.remove('open');document.getElementById('drawer').classList.remove('open');}
function renderDrawer(){
  const body=document.getElementById('drawerBody');
  if(!scraps.length){body.innerHTML=`<div class="drawer-empty"><div style="font-size:32px;margin-bottom:10px">📌</div><div>스크랩한 기사가 없습니다</div></div>`;return;}
  body.innerHTML=`<div style="font-size:10px;color:var(--text2);margin-bottom:4px">${scraps.length}개 저장됨</div>
  ${scraps.map((item,i)=>`<div class="scrap-item">
    <div class="si-title">${esc(item.title)}</div>
    <div class="si-meta"><span class="si-src">${esc(item.source||'')}</span><span class="si-dt">${fmtDate(item.savedAt)}</span></div>
    <div class="si-acts">
      <button class="sa" onclick="shareScrapIdx(${i})">공유</button>
      ${item.url?`<button class="sa" onclick="goUrl('${esc(item.url)}')">원문</button>`:''}
      <button class="sa sa-del" onclick="delScrap(${i})">삭제</button>
    </div>
  </div>`).join('')}
  <button class="clear-btn" onclick="clearAll()">🗑️ 전체 삭제</button>`;
}

// ══ UTILS ══
function setStatus(t){document.getElementById('statusTxt').textContent=t;}
function goUrl(url){if(url&&url.startsWith('http'))window.open(url,'_blank');}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):''}
function stamp(){document.getElementById('tsEl').textContent='📅 '+new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})+' 기준';}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function relTime(p){if(!p)return'';const m=Math.floor((Date.now()-new Date(p))/60000);if(m<1)return'방금';if(m<60)return m+'분 전';const h=Math.floor(m/60);if(h<24)return h+'시간 전';return Math.floor(h/24)+'일 전';}
let tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2600);}
</script>
